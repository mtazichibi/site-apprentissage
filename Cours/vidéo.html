<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vidéo du cours</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    .video-card {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 10px;
    }
    a.back {
      display: inline-block;
      margin-top: 16px;
      text-decoration: none;
      color: #0a66c2;
    }
  </style>
</head>
<body>
  <div class="video-card">
    <h1>GitHub Pages en vidéo</h1>
    <p>Regardez le cours directement ici.</p>

    <iframe
      src="https://www.youtube.com/embed/QyFcl_Fba-k"
      title="Présentation vidéo"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>

    <a href="../index.html" class="back">← Retour à l’accueil</a>
  </div>
</body>
</html>
